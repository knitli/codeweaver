#:tombi schema.strict = false

[project]
name = "code-weaver-tokenizers"
description = "Ready-to-use tokenizers for CodeWeaver — tiktoken and HuggingFace tokenizers with a unified interface"
readme = "README.md"
requires-python = ">=3.12"
dynamic = ["version"]
license = "MIT OR Apache-2.0"
authors = [
  { name = "Knitli Inc." },
  { name = "Adam Poulemanos", email = "adam@knit.li" },
]
keywords = ["codeweaver", "embeddings", "nlp", "tiktoken", "tokenizers"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Typing :: Typed",
]
dependencies = [
  "tiktoken>=0.12.0",
  "tokenizers>=0.22.1",
  "typing_extensions>=4.15.0",
]
# Version is derived from the same git tag as the root code-weaver package
# via uv-dynamic-versioning, so all three workspace packages always ship with
# matching versions and the root can pin them with `=={{ version }}` in its
# metadata hook.
dynamic = ["version"]

[project.urls]
Homepage = "https://knitli.com"
Issues = "https://github.com/knitli/codeweaver/issues"
Repository = "https://github.com/knitli/codeweaver"

[build-system]
requires = ["hatchling", "uv-dynamic-versioning>=0.14.0"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.hatch.build.targets.wheel]
packages = ["./src/codeweaver_tokenizers"]

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true
dirty = false
commit-prefix = "g"

[tool.pytest]
addopts = ["--cov-report=term-missing", "--cov=codeweaver_tokenizers"]
markers = [
  "asyncio: Marks tests as asyncio tests",
  "expensive: Tests that are resource-intensive and may take a long time to run",
  "fast: Fast unit tests that do not require external resources",
  "heavy: Tests that require model downloads or are otherwise resource-intensive",
  "integration: Integration tests that may require external resources but not real model providers",
  "real_providers: Tests that interact with real model providers and may require model downloads",
  "requires_models: Tests that require model downloads to run",
  "skip: Tests that are skipped by default unless explicitly requested",
  "unit: Standard unit tests that do not require external resources",
]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff.lint]
per-file-ignores = { "tests/*" = ["S101"] }

[tool.uv-dynamic-versioning]
vcs = "git"
style = "pep440"
bump = true
dirty = false
commit-prefix = "g"
