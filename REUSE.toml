# =============================================================================
# data/node_types/analysis - Aggregated/derived tree-sitter node type data
# =============================================================================
# These files are derived from multiple tree-sitter grammars.
# The aggregation itself is a CodeWeaver contribution, but the underlying
# data comes from the tree-sitter grammar projects listed above.
[[annotations]]
path = "data/node_types/analysis/**"
precedence = "override"
SPDX-FileCopyrightText = [
  "2014-2021 Tree-sitter grammar contributors (see individual grammar licenses)",
  "2026 Knitli Inc."
]
SPDX-License-Identifier = "MIT"

# =============================================================================
# scripts/dev-env/.zfunc - Shell completions for external tools
# =============================================================================
# These are generated shell completion scripts for mise and hk.
# Both mise and hk are by Jeff Dickey (jdx) and are MIT licensed.
[[annotations]]
path = ["scripts/dev-env/.zfunc/_mise", "scripts/dev-env/.zfunc/_hk"]
precedence = "override"
SPDX-FileCopyrightText = "2023-2024 Jeff Dickey (jdx)"
SPDX-License-Identifier = "MIT"

# =============================================================================
# .specify/scripts/bash/*.sh - Bash scripts for Spec-Driven Development workflow
# =============================================================================
# These bash scripts are installed from the spec-driven development package.
# https://github.com/github/spec-kit
#
[[annotations]]
path = [".specify/scripts/bash/*.sh"]
precedence = "override"
SPDX-FileCopyrightText = "2025 GitHub Inc."
SPDX-License-Identifier = "MIT"

# =============================================================================
# CHANGELOG.md - Generated by git-cliff, cannot contain inline SPDX comments
# =============================================================================
# git-cliff's --prepend regenerates the header from the template, which
# displaces any inline SPDX comments. Covered here instead.
[[annotations]]
path = "CHANGELOG.md"
precedence = "override"
SPDX-FileCopyrightText = "2026 Knitli Inc."
SPDX-License-Identifier = "MIT OR Apache-2.0"

[[annotations]]
path = ["docs-site/src/**", "docs-site/public/**"]
precedence = "override"
SPDX-FileCopyrightText = "2026 Knitli Inc."
SPDX-License-Identifier = "MIT OR Apache-2.0"

# =============================================================================
# data/grammars - Tree-sitter grammar.js source files
# =============================================================================
# Vendored grammar.js files from upstream tree-sitter grammar projects.
# The vast majority of tree-sitter grammars are MIT-licensed by their
# respective authors (Max Brunsfeld and contributors for the core set,
# various community maintainers for the rest). The Elixir and HCL grammars
# are Apache-2.0; we annotate them individually below.
[[annotations]]
path = ["data/grammars/*.js"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2014-2021 Tree-sitter grammar contributors"
SPDX-License-Identifier = "MIT"

