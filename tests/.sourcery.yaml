# $schema: https://www.schemastore.org/sourcery_yaml_schema.json
rule_settings:
  enable:
    - default
    - gpsg
  disable:
    - dont-self-assign-variables
    - do-not-use-staticmethod
    - avoid-global-variables
    - docstrings-for-functions
    - don't-import-test-modules
    - name-type-suffix
  rule_types:
    - refactoring
    - comment
