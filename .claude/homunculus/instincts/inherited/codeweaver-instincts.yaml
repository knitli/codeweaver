# Codeweaver Workflow Install Profile Smoke Test Suite Extension

## Action

Follow the install-profile-smoke-test-suite-extension workflow:
1. Add or update tests in tests/unit/ (e.g., test_lazy_imports.py, test_install_smoke.py) to verify import behavior in subprocesses.
2. Tag tests with custom pytest markers (e.g., install_smoke).
