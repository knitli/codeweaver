# Codeweaver Workflow Python Dependency Metadata Refactor

## Action

Follow the python-dependency-metadata-refactor workflow:
1. Edit root pyproject.toml to change [project.dependencies], [project.optional-dependencies], or [tool.*] sections.
2. Edit workspace member pyproject.toml files (e.g., packages/codeweaver-daemon/pyproject.toml, packages/codeweaver-tokenizers/pyproject.toml) to synchronize or update dependency metadata.
3. Update uv.lock to reflect the new dependency resolution.
4. Verify by building wheels or running dependency-related commands.
5. Optionally, add or update related tests to verify import behavior or dependency isolation.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: pyproject.toml, uv.lock, packages/codeweaver-daemon/pyproject.toml

