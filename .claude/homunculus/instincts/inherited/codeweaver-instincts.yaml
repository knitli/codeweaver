# Codeweaver Workflow Dependency Group Refactor And Lock Update

## Action

Follow the dependency-group-refactor-and-lock-update workflow:
1. Edit pyproject.toml (root and/or packages/*/pyproject.toml) to change dependency groups, extras, or dynamic metadata.
2. Update uv.lock to reflect new dependency structure.
3. Optionally update related test markers or comments.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: pyproject.toml, uv.lock, packages/*/pyproject.toml

