# Codeweaver Workflow Optional Dependency Import Guard Fix

## Action

Follow the optional-dependency-import-guard-fix workflow:
1. Identify files where optional dependency imports are not properly guarded.
2. Update those files to wrap imports in has_package checks, TYPE_CHECKING, or try/except ImportError blocks, providing fallback types (Any) as needed.
3. Update pyproject.toml to suppress type checker warnings for intentional fallbacks.
4. Verify test suite passes in both full and minimal dependency environments.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/codeweaver/providers/config/clients/multi.py, src/codeweaver/providers/config/categories/embedding.py, src/codeweaver/providers/config/categories/sparse_embedding.py

